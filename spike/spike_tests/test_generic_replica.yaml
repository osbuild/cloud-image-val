      pkgs='rhel-system-roles-sap bind-utils nfs-utils tcsh uuidd cairo expect graphviz gtk2 iptraf-ng krb5-workstation libaio libatomic libcanberra-gtk2 libicu libtool-ltdl lm_sensors net-tools numactl PackageKit-gtk3-module xorg-x11-xauth libnsl tuned-profiles-sap-hana'
