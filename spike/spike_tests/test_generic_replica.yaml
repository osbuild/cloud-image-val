  # test_ha_specific_script
  - action: assert_command_exit_code
    name: "test_ha_specific_script"
    command: |
      is_ha=0
      rpm -q pacemaker >/dev/null 2>&1 && is_ha=1 || true
      rpm -q resource-agents >/dev/null 2>&1 && is_ha=1 || true
      [ "$is_ha" -eq 1 ] || exit 0

      cloud=''
      if [ -f /sys/hypervisor/uuid ] && grep -qi '^ec2' /sys/hypervisor/uuid; then
        cloud='aws'
      elif [ -d /var/lib/waagent ] || [ -f /etc/waagent.conf ] || grep -qiE 'microsoft|azure' /sys/class/dmi/id/sys_vendor 2>/dev/null; then
        cloud='azure'
      fi

      [ -n "$cloud" ] || exit 0
      script="scripts/rhel-ha-${cloud}-check.sh"
      [ -f "$script" ] || exit 0

      out=$(bash "$script" 2>&1)
      rc=$?
      echo "$out"
      [ "$rc" -eq 0 ] && echo "$out" | grep -q 'HA check passed successfully.'
    expected: 0
    conditions:
      run_on: [rhel]
