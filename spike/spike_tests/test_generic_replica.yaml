  # test_cmdline_console_and_params
  - action: assert_command_exit_code
    name: "test_cmdline_console_and_params"
    command: |
      cmdline=$(cat /proc/cmdline)
      is_azure=0
      if [ -d /var/lib/waagent ] || [ -f /etc/waagent.conf ] || grep -qiE 'microsoft|azure' /sys/class/dmi/id/sys_vendor 2>/dev/null; then
        is_azure=1
      fi

      if echo "$cmdline" | grep -q 'console=tty0'; then
        echo "$cmdline" | grep -q 'console=ttyS0'
      else
        if [ "$(uname -m)" = "aarch64" ] && [ "$is_azure" -eq 1 ]; then
          echo "$cmdline" | grep -q 'console=ttyAMA0'
        else
          echo "$cmdline" | grep -q 'console=ttyS0'
        fi
      fi

      if [ "$(uname -m)" = "x86_64" ] && [ "$is_azure" -eq 1 ]; then
        echo "$cmdline" | grep -q 'earlyprintk=ttyS0'
        echo "$cmdline" | grep -q 'rootdelay=300'

        v=$(. /etc/os-release; echo "$VERSION_ID")
        case "$v" in
          9.6|9.7|10.0|10.1)
            echo "$cmdline" | grep -q 'nvme_core.io_timeout=240'
            ;;
        esac
      fi
    expected: 0
    conditions:
      run_on: [rhel]

  # test_boot_mount_presence
  - action: assert_command_exit_code
    name: "test_boot_mount_presence"
    command: |
      distro=$(. /etc/os-release; echo "$ID")
      major=$(. /etc/os-release; echo "${VERSION_ID%%.*}")
      arch=$(uname -m)
      is_azure=0
      lvm_check=0

      if [ -d /var/lib/waagent ] || [ -f /etc/waagent.conf ] || grep -qiE 'microsoft|azure' /sys/class/dmi/id/sys_vendor 2>/dev/null; then
        is_azure=1
      fi
      lsblk -f 2>/dev/null | grep -q LVM && lvm_check=1 || true

      if { [ "$major" = "8" ] && [ "$arch" = "aarch64" ]; } \
         || [ "$major" = "9" ] \
         || { [ "$major" -ge 10 ] && [ "$is_azure" -eq 1 ] && [ "$lvm_check" -eq 1 ]; } \
         || [ "$distro" = "fedora" ]; then
        mountpoint -q /boot || exit 1
        total=$(df --block-size=1 /boot | tail -1 | awk '{print $2}')
        [ "$total" -ge 1006632960 ]
      else
        ! mountpoint -q /boot
      fi
    expected: 0

